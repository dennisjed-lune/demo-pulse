<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Lune Pulse — Cashback</title>
<style>
  /* ============================================================
     Lune Design System tokens (inlined from the DS bundle)
     ============================================================ */
  @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&family=Cormorant+Garamond:ital,wght@1,500;1,600;1,700&display=swap');

  :root {
    /* ---- Brand core ---- */
    --lune-emerald:      #10A37F;
    --lune-teal:         #002E2A;
    --lune-teal-700:     #0A634D;
    --lune-mint:         #99F2AC;
    --lune-ink:          #070312;
    --lune-sea:          #469A93;

    /* ---- Emerald ramp ---- */
    --primary-100:       #10A37F;
    --primary-90:        rgba(16,163,127,0.90);
    --primary-80:        rgba(16,163,127,0.80);
    --primary-70:        rgba(16,163,127,0.70);
    --primary-60:        rgba(16,163,127,0.60);
    --primary-50:        rgba(16,163,127,0.50);
    --primary-40:        rgba(16,163,127,0.40);
    --primary-30:        rgba(16,163,127,0.30);
    --primary-20:        rgba(16,163,127,0.20);
    --primary-10:        rgba(16,163,127,0.10);

    /* ---- Neutral ramp ---- */
    --neutral-0:         #FFFFFF;
    --neutral-25:        #F7F9F8;
    --neutral-50:        #EEF2F1;
    --neutral-100:       #E2E8E6;
    --neutral-200:       #C9D3D0;
    --neutral-300:       #A7B4B0;
    --neutral-400:       #7E8E89;
    --neutral-500:       #5C6B66;
    --neutral-600:       #44524E;
    --neutral-700:       #2E3A36;
    --neutral-800:       #1B2421;
    --neutral-900:       #0E1513;
    --neutral-950:       #070312;

    /* ---- Status ---- */
    --status-success:    #99F2AC;
    --status-success-ink:#063D1B;
    --status-warning:    #FBDA7D;
    --status-warning-ink:#5A4205;
    --status-info:       #5A9CB5;
    --status-info-ink:   #0C3543;
    --status-error:      #F26076;
    --status-error-ink:  #5C0C18;

    /* ---- Semantic aliases (light) ---- */
    --bg-canvas:         var(--neutral-25);
    --bg-surface:        var(--neutral-0);
    --bg-raised:         var(--neutral-0);
    --bg-sunken:         var(--neutral-50);
    --bg-inverse:        var(--lune-ink);

    --surface-card:      var(--neutral-0);
    --surface-muted:     var(--neutral-50);
    --surface-emerald:   var(--primary-10);

    --text-primary:      var(--lune-teal);
    --text-secondary:    var(--neutral-600);
    --text-tertiary:     var(--neutral-400);
    --text-on-emerald:   var(--neutral-0);
    --text-on-inverse:   var(--neutral-0);
    --text-link:         var(--lune-emerald);

    --border-subtle:     var(--neutral-100);
    --border-default:    var(--neutral-200);
    --border-strong:     var(--neutral-300);
    --border-emerald:    var(--lune-emerald);

    --accent:            var(--lune-emerald);
    --accent-hover:      #0E9173;
    --accent-press:      #0B7C62;
    --focus-ring:        rgba(16,163,127,0.35);

    /* ---- Typography ---- */
    --font-sans: "Plus Jakarta Sans", -apple-system, BlinkMacSystemFont,
                 "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    --font-display: "Cormorant Garamond", ui-serif, Georgia,
                    "Times New Roman", serif;
    --font-mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;

    --weight-regular: 400;
    --weight-medium:  500;
    --weight-semibold:600;
    --weight-bold:    700;
    --weight-extra:   800;

    --text-body-size: 14px; --text-body-lh: 1.5;

    --tracking-tight: -0.02em;
    --tracking-normal: 0;
    --tracking-wide: 0.04em;

    /* ---- Spacing (4px base) ---- */
    --space-0:  0;
    --space-1:  4px;
    --space-2:  8px;
    --space-3:  12px;
    --space-4:  16px;
    --space-5:  20px;
    --space-6:  24px;
    --space-8:  32px;
    --space-10: 40px;
    --space-12: 48px;
    --space-16: 64px;
    --space-20: 80px;
    --space-24: 96px;
    --space-32: 128px;

    /* ---- Radii ---- */
    --radius-xs:   4px;
    --radius-sm:   8px;
    --radius-md:   12px;
    --radius-lg:   16px;
    --radius-xl:   24px;
    --radius-2xl:  32px;
    --radius-pill: 999px;

    /* ---- Border widths ---- */
    --border-hairline: 1px;
    --border-thick:    1.5px;

    /* ---- Elevation ---- */
    --shadow-xs:  0 1px 2px rgba(7,3,18,0.06);
    --shadow-sm:  0 1px 3px rgba(7,3,18,0.08), 0 1px 2px rgba(7,3,18,0.04);
    --shadow-md:  0 4px 12px rgba(7,3,18,0.08), 0 2px 4px rgba(7,3,18,0.04);
    --shadow-lg:  0 12px 32px rgba(7,3,18,0.12), 0 4px 8px rgba(7,3,18,0.05);
    --shadow-xl:  0 24px 64px rgba(7,3,18,0.16);
    --shadow-emerald: 0 8px 24px rgba(16,163,127,0.28);

    /* ---- Motion ---- */
    --ease-standard: cubic-bezier(0.2, 0, 0, 1);
    --ease-emphasis: cubic-bezier(0.3, 0.7, 0, 1);
    --ease-out:      cubic-bezier(0, 0, 0.2, 1);
    --dur-fast:   120ms;
    --dur-base:   200ms;
    --dur-slow:   320ms;
  }

  /* ---- base reset ---- */
  *, *::before, *::after { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; text-rendering: optimizeLegibility; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: var(--font-sans);
    font-size: var(--text-body-size);
    line-height: var(--text-body-lh);
    font-weight: var(--weight-regular);
    color: var(--text-primary);
    background: var(--bg-canvas);
  }
  h1, h2, h3, h4, h5, h6, p, figure { margin: 0; }
  button, input { font-family: inherit; }
  img, svg { display: block; max-width: 100%; }
  ::selection { background: var(--lune-mint); color: var(--lune-teal); }

  /* ============================================================
     Lune Pulse — prototype styles (from pulse.css)
     ============================================================ */

  /* ====== Stage ====== */
  .p-stage {
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    background: var(--neutral-50);
    padding: 24px;
  }

  /* ====== Screen ====== */
  .p-screen {
    --p-accent-press: color-mix(in oklab, var(--p-accent), black 14%);
    --p-accent-soft: color-mix(in oklab, var(--p-accent), white 90%);
    --p-accent-soft-2: color-mix(in oklab, var(--p-accent), white 82%);
    --p-accent-deep: color-mix(in oklab, var(--p-accent), black 38%);
    height: 100%;
    display: flex; flex-direction: column;
    background: var(--neutral-25);
    font-family: var(--font-sans);
    color: var(--text-primary);
    position: relative;
    overflow: hidden;
  }

  /* ====== Header ====== */
  .p-nav {
    display: flex; align-items: center; gap: var(--space-2);
    padding: 64px var(--space-4) 0;
  }
  .p-nav-back {
    width: 36px; height: 36px; border: none; background: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: var(--text-primary); margin-left: -8px; border-radius: var(--radius-pill);
  }
  .p-title {
    font-size: 26px; font-weight: var(--weight-bold);
    letter-spacing: var(--tracking-tight); line-height: 1.3;
  }
  .p-tabs {
    display: flex; gap: var(--space-2);
    padding: var(--space-3) var(--space-4) 0;
    border-bottom: var(--border-hairline) solid var(--border-subtle);
    background: var(--neutral-25);
  }
  .p-tab {
    appearance: none; border: none; background: none; cursor: pointer;
    font-family: inherit; font-size: 15px; font-weight: var(--weight-semibold);
    color: var(--text-tertiary);
    padding: var(--space-2) var(--space-3) var(--space-3);
    position: relative; min-height: 44px;
  }
  .p-tab.is-active { color: var(--p-accent); }
  .p-tab::after {
    content: ""; position: absolute; left: var(--space-3); right: var(--space-3);
    bottom: -1px; height: 3px; border-radius: 3px 3px 0 0;
    background: transparent; transition: background var(--dur-base) var(--ease-standard);
  }
  .p-tab.is-active::after { background: var(--p-accent); }

  /* ====== Scroll body ====== */
  .p-body {
    flex: 1; overflow-y: auto; overscroll-behavior: contain;
    padding: var(--space-4) var(--space-4) 48px;
    scrollbar-width: none;
  }
  .p-body::-webkit-scrollbar { display: none; }

  /* ====== Activation banner ====== */
  .p-banner {
    display: flex; align-items: center; gap: var(--space-3);
    background: var(--p-accent-soft);
    border: var(--border-hairline) solid color-mix(in oklab, var(--p-accent), white 70%);
    border-radius: var(--p-r-card, var(--radius-md));
    padding: var(--space-3) var(--space-4);
    margin-bottom: var(--space-4);
  }
  .p-banner-icon {
    width: 38px; height: 38px; flex-shrink: 0;
    border-radius: var(--radius-pill);
    background: var(--p-accent); color: #fff;
    display: flex; align-items: center; justify-content: center;
  }
  .p-banner-title { font-size: 14px; font-weight: var(--weight-bold); line-height: 1.35; }
  .p-banner-sub { font-size: 12.5px; color: var(--text-secondary); line-height: 1.4; }

  /* ====== Offer card ====== */
  .p-card {
    background: var(--bg-surface);
    border-radius: var(--p-r-card, var(--radius-lg));
    box-shadow: var(--shadow-sm);
    border: var(--border-hairline) solid var(--border-subtle);
    overflow: hidden;
    margin-bottom: var(--space-4);
  }
  .p-hero {
    position: relative; overflow: hidden;
    background: var(--neutral-100);
  }
  .p-hero img {
    width: 100%; height: 100%; object-fit: cover; display: block;
  }
  .p-hero-scrim {
    position: absolute; inset: 0;
    background: linear-gradient(180deg, rgba(7,3,18,0.42) 0%, rgba(7,3,18,0.05) 45%, rgba(7,3,18,0.55) 100%);
  }
  .p-new-badge {
    position: absolute; top: 10px; right: 10px; z-index: 3;
    font-size: 10.5px; font-weight: var(--weight-bold); letter-spacing: 0.04em; text-transform: uppercase;
    color: var(--lune-teal); background: var(--lune-mint);
    padding: 4px 9px; border-radius: var(--radius-pill);
    box-shadow: 0 4px 12px -4px rgba(7,3,18,0.4);
  }
  .p-chip {
    position: absolute; top: var(--space-3); left: var(--space-3);
    display: flex; align-items: center; gap: 7px;
    background: rgba(255,255,255,0.92);
    backdrop-filter: blur(8px);
    border-radius: var(--radius-pill);
    padding: 4px 12px 4px 4px;
  }
  .p-chip-logo {
    width: 24px; height: 24px; border-radius: var(--radius-pill);
    background: var(--lune-teal); color: #fff;
    font-size: 12px; font-weight: var(--weight-bold);
    display: flex; align-items: center; justify-content: center;
  }
  .p-chip-name { font-size: 12px; font-weight: var(--weight-semibold); color: var(--lune-teal); }
  .p-headline {
    position: absolute; left: var(--space-4); right: var(--space-4); bottom: var(--space-3);
    color: #fff; font-size: 18px; font-weight: var(--weight-bold);
    line-height: 1.3; letter-spacing: var(--tracking-tight);
    text-shadow: 0 1px 8px rgba(7,3,18,0.35);
    text-wrap: balance;
  }
  .p-validity {
    font-size: 12px; color: var(--text-tertiary);
    display: flex; align-items: center; gap: var(--space-2);
  }
  .p-validity strong { color: var(--text-secondary); font-weight: var(--weight-semibold); }
  .p-card-foot { padding: var(--space-3) var(--space-4) var(--space-4); }
  .p-cta-row { display: flex; gap: var(--space-2); margin-top: var(--space-3); }

  /* Layout: classic */
  .p-card.layout-classic .p-hero { height: 150px; }

  /* Layout: immersive */
  .p-card.layout-immersive .p-hero { height: 200px; }
  .p-card.layout-immersive .p-headline { bottom: 34px; font-size: 20px; }
  .p-validity-onimage {
    position: absolute; left: var(--space-4); bottom: var(--space-3);
    font-size: 11.5px; color: rgba(255,255,255,0.85);
  }
  .p-card.layout-immersive .p-card-foot { padding-top: var(--space-3); }

  /* Layout: split */
  .p-card.layout-split .p-split-top {
    display: flex; gap: var(--space-3); padding: var(--space-3);
  }
  .p-card.layout-split .p-hero {
    width: 92px; height: 92px; flex-shrink: 0;
    border-radius: calc(var(--p-r-card, 16px) - 6px);
  }
  .p-card.layout-split .p-split-info { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 4px; }
  .p-split-brandline { display: flex; align-items: center; gap: 6px; }
  .p-card.layout-split .p-chip-logo { width: 20px; height: 20px; font-size: 10px; }
  .p-split-brand { font-size: 12px; font-weight: var(--weight-semibold); color: var(--text-secondary); }
  .p-split-headline {
    font-size: 15.5px; font-weight: var(--weight-bold); line-height: 1.3;
    letter-spacing: var(--tracking-tight); color: var(--text-primary);
  }
  .p-card.layout-split .p-card-foot { padding: 0 var(--space-3) var(--space-3); }
  .p-card.layout-split .p-cta-row { margin-top: 0; }

  /* Ended state */
  .p-card.is-ended .p-hero img { filter: grayscale(0.9); opacity: 0.7; }
  .p-card.is-ended .p-headline { opacity: 0.85; }
  .p-ended-divider {
    display: flex; align-items: center; gap: var(--space-3);
    margin: var(--space-5) 0 var(--space-4);
    color: var(--text-tertiary);
    font-size: 11px; font-weight: var(--weight-bold);
    letter-spacing: var(--tracking-wide); text-transform: uppercase;
  }
  .p-ended-divider::before, .p-ended-divider::after {
    content: ""; flex: 1; height: 1px; background: var(--border-default);
  }

  /* ====== Buttons ====== */
  .p-btn {
    appearance: none; cursor: pointer; border: none;
    font-family: inherit; font-size: 14px; font-weight: var(--weight-semibold);
    min-height: 44px; padding: 0 var(--space-4);
    border-radius: var(--p-r-btn, var(--radius-md));
    display: inline-flex; align-items: center; justify-content: center; gap: 7px;
    flex: 1; position: relative;
    transition: background var(--dur-fast) var(--ease-standard),
                color var(--dur-fast) var(--ease-standard),
                transform var(--dur-fast) var(--ease-standard);
  }
  .p-btn:active { transform: scale(0.98); }
  .p-btn-primary { background: var(--p-accent); color: #fff; }
  .p-btn-primary:hover { background: var(--p-accent-press); }
  .p-btn-secondary {
    background: var(--bg-surface); color: var(--text-primary);
    box-shadow: inset 0 0 0 var(--border-thick) var(--border-default);
  }
  .p-btn-secondary:hover { box-shadow: inset 0 0 0 var(--border-thick) var(--border-strong); }
  .p-btn-disabled, .p-btn-disabled:hover {
    background: var(--neutral-50); color: var(--text-tertiary);
    cursor: default; transform: none;
  }
  .p-btn-disabled:active { transform: none; }
  .p-btn-activated, .p-btn-activated:hover {
    background: var(--p-accent-soft); color: var(--p-accent-deep);
    cursor: default;
  }
  .p-btn-activated:active { transform: none; }

  /* Activation feedback */
  @media (prefers-reduced-motion: no-preference) {
    .fb-morph { animation: p-morph-in 480ms var(--ease-emphasis); }
    @keyframes p-morph-in {
      0% { transform: scale(0.96); }
      45% { transform: scale(1.04); }
      100% { transform: scale(1); }
    }
    .fb-morph .p-check-path {
      stroke-dasharray: 24; stroke-dashoffset: 24;
      animation: p-check-draw 360ms 120ms var(--ease-out) forwards;
    }
    @keyframes p-check-draw { to { stroke-dashoffset: 0; } }
    .fb-pulse::after {
      content: ""; position: absolute; inset: 0;
      border-radius: inherit;
      box-shadow: 0 0 0 0 color-mix(in oklab, var(--p-accent), transparent 30%);
      animation: p-pulse-ring 700ms var(--ease-out) forwards;
      pointer-events: none;
    }
    @keyframes p-pulse-ring {
      0% { box-shadow: 0 0 0 0 color-mix(in oklab, var(--p-accent), transparent 30%); opacity: 1; }
      100% { box-shadow: 0 0 0 14px color-mix(in oklab, var(--p-accent), transparent 100%); opacity: 0; }
    }
  }

  /* ====== Empty state ====== */
  .p-empty {
    flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; padding: var(--space-8) var(--space-8) var(--space-16);
    min-height: 420px;
  }
  .p-empty-icon {
    width: 72px; height: 72px; border-radius: var(--radius-pill);
    background: var(--p-accent-soft); color: var(--p-accent);
    display: flex; align-items: center; justify-content: center;
    margin-bottom: var(--space-5);
  }
  .p-empty-h { font-size: 17px; font-weight: var(--weight-bold); margin-bottom: var(--space-2); }
  .p-empty-b { font-size: 13.5px; color: var(--text-secondary); line-height: 1.5; max-width: 240px; }

  /* ====== Activity summary ====== */
  .p-summary {
    background: linear-gradient(150deg, var(--p-accent) 0%, var(--p-accent-deep) 120%);
    color: #fff;
    border-radius: var(--p-r-card, var(--radius-lg));
    padding: var(--space-6) var(--space-5) var(--space-5);
    box-shadow: var(--shadow-md);
  }
  .p-summary-label {
    font-size: 12px; font-weight: var(--weight-bold);
    letter-spacing: var(--tracking-wide); text-transform: uppercase;
    opacity: 0.8; margin-bottom: var(--space-3);
  }
  .p-summary-amount {
    font-size: 38px; font-weight: var(--weight-extra);
    letter-spacing: var(--tracking-tight); line-height: 1.1;
  }
  .p-summary-amount small { font-size: 19px; font-weight: var(--weight-semibold); opacity: 0.85; margin-left: 4px; }
  .p-summary-sub { font-size: 13px; opacity: 0.78; margin-top: 6px; }
  .p-summary-stats {
    display: flex; margin-top: var(--space-5);
    border-top: 1px solid rgba(255,255,255,0.22); padding-top: var(--space-4);
  }
  .p-summary-stat { flex: 1; }
  .p-summary-stat + .p-summary-stat {
    border-left: 1px solid rgba(255,255,255,0.22);
    padding-left: var(--space-4);
  }
  .p-summary-stat-amt { font-size: 17px; font-weight: var(--weight-bold); }
  .p-summary-stat-lbl { font-size: 12px; opacity: 0.78; margin-top: 2px; }

  /* Compact summary */
  .p-summary.is-compact { padding: var(--space-5) var(--space-5) var(--space-4); margin-bottom: var(--space-4); }
  .p-summary.is-compact .p-summary-label { margin-bottom: var(--space-2); }
  .p-summary.is-compact .p-summary-amount { font-size: 30px; }
  .p-summary.is-compact .p-summary-amount small { font-size: 16px; }
  .p-summary.is-compact .p-summary-sub { margin-top: 2px; }
  .p-summary.is-compact .p-summary-stats { margin-top: var(--space-4); padding-top: var(--space-3); }
  .p-summary.is-compact .p-summary-stat-amt { font-size: 15px; }

  /* ====== Bottom sheet ====== */
  .p-sheet-backdrop {
    position: absolute; inset: 0; z-index: 30;
    background: rgba(7,3,18,0.45);
    opacity: 0; transition: opacity var(--dur-slow) var(--ease-standard);
  }
  .p-sheet-backdrop.is-open { opacity: 1; }
  .p-sheet {
    position: absolute; left: 0; right: 0; bottom: 0; z-index: 31;
    height: 88%;
    background: var(--bg-surface);
    border-radius: var(--radius-xl) var(--radius-xl) 0 0;
    box-shadow: var(--shadow-xl);
    display: flex; flex-direction: column;
    transform: translateY(100%);
    transition: transform var(--dur-slow) var(--ease-emphasis);
    touch-action: none;
  }
  .p-sheet.is-open { transform: translateY(0); }
  .p-sheet.is-dragging { transition: none; }
  .p-sheet-handle-zone {
    position: absolute; top: 0; left: 0; right: 0; height: 28px; z-index: 5;
    display: flex; justify-content: center; padding-top: 8px; cursor: grab;
  }
  .p-sheet-handle { width: 40px; height: 4.5px; border-radius: 4px; background: rgba(255,255,255,0.75); }
  .p-sheet-scroll { flex: 1; overflow-y: auto; scrollbar-width: none; border-radius: inherit; }
  .p-sheet-scroll::-webkit-scrollbar { display: none; }
  .p-sheet-hero { position: relative; height: 210px; flex-shrink: 0; background: var(--neutral-100); }
  .p-sheet-hero img { width: 100%; height: 100%; object-fit: cover; }
  .p-sheet-close {
    position: absolute; top: var(--space-3); right: var(--space-3);
    width: 34px; height: 34px; border: none; cursor: pointer;
    border-radius: var(--radius-pill);
    background: rgba(7,3,18,0.45); color: #fff;
    backdrop-filter: blur(6px);
    display: flex; align-items: center; justify-content: center;
  }
  .p-sheet-hero .p-chip { top: 38px; }
  .p-sheet-body { padding: var(--space-5) var(--space-5) var(--space-4); display: flex; flex-direction: column; gap: var(--space-6); }

function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    try { window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*'); } catch (e) {}
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e && e.data && e.data.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    try { window.parent.postMessage({ type: '__edit_mode_available' }, '*'); } catch (e) {}
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    try { window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*'); } catch (e) {}
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = { x: startRight - (ev.clientX - sx), y: startBottom - (ev.clientY - sy) };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <React.Fragment>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-omelette-chrome=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </React.Fragment>
  );
}

function TweakSection({ label, children }) {
  return (<React.Fragment><div className="twk-sect">{label}</div>{children}</React.Fragment>);
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const valueRef = React.useRef(value);
  valueRef.current = value;

  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options} onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

function TweakColor({ label, value, options, onChange }) {
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (<span>{sup.map((c, j) => <i key={j} style={{ background: c }} />)}</span>)}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakToggle, TweakRadio, TweakSelect, TweakColor, TweakButton,
});
</script>

<script type="text/babel" data-presets="react">
function PDetailSheet({ offer, state, justActivated, feedback, onActivate, onClose }) {
  const [open, setOpen] = React.useState(false);
  const [dragY, setDragY] = React.useState(0);
  const dragRef = React.useRef(null);
  const sheetRef = React.useRef(null);

  React.useEffect(() => {
    const t = requestAnimationFrame(() => setOpen(true));
    return () => cancelAnimationFrame(t);
  }, []);

  const dismiss = () => {
    setOpen(false);
    setTimeout(onClose, 320);
  };

  const onPointerDown = (e) => {
    dragRef.current = { startY: e.clientY, moved: 0 };
    e.currentTarget.setPointerCapture(e.pointerId);
  };
  const onPointerMove = (e) => {
    if (!dragRef.current) return;
    const dy = Math.max(0, e.clientY - dragRef.current.startY);
    dragRef.current.moved = dy;
    setDragY(dy);
  };
  const onPointerUp = () => {
    if (!dragRef.current) return;
    const dy = dragRef.current.moved;
    dragRef.current = null;
    setDragY(0);
    if (dy > 110) dismiss();
  };

  if (!offer) return null;
  const steps = [
    { icon: PIcon.store(19), t: offer.step1[0], s: offer.step1[1] },
    { icon: PIcon.card(19), t: PULSE_STEPS_23[0][0], s: PULSE_STEPS_23[0][1] },
    { icon: PIcon.statement(19), t: PULSE_STEPS_23[1][0], s: PULSE_STEPS_23[1][1] },
  ];

  return (
    <React.Fragment>
      <div className={`p-sheet-backdrop ${open ? 'is-open' : ''}`} onClick={dismiss}></div>
      <div
        ref={sheetRef}
        className={`p-sheet ${open ? 'is-open' : ''} ${dragY > 0 ? 'is-dragging' : ''}`}
        style={dragY > 0 ? { transform: `translateY(${dragY}px)` } : undefined}
        data-comment-anchor="offer-detail-sheet"
      >
        <div
          className="p-sheet-handle-zone"
          onPointerDown={onPointerDown}
          onPointerMove={onPointerMove}
          onPointerUp={onPointerUp}
        >
          <div className="p-sheet-handle"></div>
        </div>
        <div className="p-sheet-scroll">
          <div className="p-sheet-hero">
            <img src={offer.img} alt={offer.brand} />
            <div className="p-hero-scrim"></div>
            <PBrandChip offer={offer} />
            <button className="p-sheet-close" onClick={dismiss} aria-label="Close">{PIcon.close(14)}</button>
            <h3 className="p-headline" style={{ bottom: 34 }}>{offer.headline}</h3>
            <PValidity offer={offer} onImage />
          </div>
          <div className="p-sheet-body">
            <section>
              <h4 className="p-sheet-h">Offer Description</h4>
              <p className="p-sheet-p">{offer.description}</p>
            </section>
            <section>
              <h4 className="p-sheet-h">How to get cashback</h4>
              <div className="p-steps">
                {steps.map((st, i) => (
                  <div className="p-step" key={i}>
                    <div className="p-step-rail">
                      <div className="p-step-icon">{st.icon}</div>
                      {i < steps.length - 1 && <div className="p-step-line"></div>}
                    </div>
                    <div className="p-step-text">
                      <div className="p-step-t">{st.t}</div>
                      <div className="p-step-s">{st.s}</div>
                    </div>
                  </div>
                ))}
              </div>
            </section>
            <section>
              <h4 className="p-sheet-h">Terms &amp; Conditions</h4>
              <ul className="p-terms">
                {offer.terms.map((t, i) => <li key={i}>{t}</li>)}
              </ul>
            </section>
          </div>
        </div>
        <div className="p-sheet-cta">
          <PActivateButton
            state={state}
            justActivated={justActivated}
            feedback={feedback}
            onActivate={onActivate}
          />
        </div>
      </div>
    </React.Fragment>
  );
}
Object.assign(window, { PDetailSheet });
</script>

<!-- pulse-app.jsx — app shell, state, tweaks -->
<script type="text/babel" data-presets="react">
const PULSE_TWEAK_DEFAULTS = {
  bankAccent: '#10A37F',
  cornerRadius: 'soft',
  cardLayout: 'classic',
  activationFeedback: 'morph',
  showEmpty: false,
};

const PULSE_RADII = {
  sharp: { card: '10px', btn: '8px' },
  soft:  { card: '16px', btn: '12px' },
  round: { card: '24px', btn: '999px' },
};

const PULSE_STORE_KEY = 'pulse-activations-v1';

function loadActivations() {
  try {
    const raw = localStorage.getItem(PULSE_STORE_KEY);
    if (raw) return JSON.parse(raw);
  } catch (e) {}
  return [...PULSE_SEED_ACTIVATIONS];
}

function PulseApp() {
  const [t, setTweak] = useTweaks(PULSE_TWEAK_DEFAULTS);
  const [activations, setActivations] = React.useState(loadActivations);
  const [justActivated, setJustActivated] = React.useState({});
  const [sheetOfferId, setSheetOfferId] = React.useState(null);

  React.useEffect(() => {
    try { localStorage.setItem(PULSE_STORE_KEY, JSON.stringify(activations)); } catch (e) {}
  }, [activations]);

  const offerState = (offer) => {
    if (offer.status === 'ended') return 'ended';
    return activations.includes(offer.id) ? 'activated' : 'available';
  };

  const activate = (id) => {
    setActivations((prev) => (prev.includes(id) ? prev : [...prev, id]));
    setJustActivated((prev) => ({ ...prev, [id]: true }));
  };

  const resetActivations = () => {
    setActivations([...PULSE_SEED_ACTIVATIONS]);
    setJustActivated({});
    setSheetOfferId(null);
  };

  const radii = PULSE_RADII[t.cornerRadius] || PULSE_RADII.soft;
  const active = PULSE_OFFERS.filter((o) => o.status === 'active')
    .slice().sort((a, b) => (b.isNew ? 1 : 0) - (a.isNew ? 1 : 0));
  const ended = PULSE_OFFERS.filter((o) => o.status === 'ended');
  const sheetOffer = PULSE_OFFERS.find((o) => o.id === sheetOfferId) || null;

  const cardProps = (offer) => ({
    offer,
    layout: t.cardLayout,
    state: offerState(offer),
    justActivated: !!justActivated[offer.id],
    feedback: t.activationFeedback,
    onActivate: () => activate(offer.id),
    onDetails: () => setSheetOfferId(offer.id),
  });

  return (
    <div className="p-stage">
      <IOSDevice width={402} height={874}>
        <div
          className="p-screen"
          style={{ '--p-accent': t.bankAccent, '--p-r-card': radii.card, '--p-r-btn': radii.btn }}
          data-screen-label="Cashback"
        >
          <header className="p-nav">
            <button className="p-nav-back" aria-label="Back to demo home" title="Back to demo home" onClick={() => { window.location.href = 'index.html'; }}>{PIcon.back(18)}</button>
            <h1 className="p-title">Cashback</h1>
          </header>
          <div className="p-body">
            <PActivitySummary compact />
            {t.showEmpty ? (
              <PEmptyState />
            ) : (
              <React.Fragment>
                <PBanner />
                {active.map((o) => <POfferCard key={o.id} {...cardProps(o)} />)}
                {ended.length > 0 && (
                  <React.Fragment>
                    <div className="p-ended-divider">Ended offers</div>
                    {ended.map((o) => <POfferCard key={o.id} {...cardProps(o)} />)}
                  </React.Fragment>
                )}
              </React.Fragment>
            )}
          </div>

          {sheetOffer && (
            <PDetailSheet
              offer={sheetOffer}
              state={offerState(sheetOffer)}
              justActivated={!!justActivated[sheetOffer.id]}
              feedback={t.activationFeedback}
              onActivate={() => activate(sheetOffer.id)}
              onClose={() => setSheetOfferId(null)}
            />
          )}
        </div>
      </IOSDevice>

      <TweaksPanel>
        <TweakSection label="Bank theming" />
        <TweakColor
          label="Accent colour"
          value={t.bankAccent}
          options={['#10A37F', '#1E4FA3', '#9B1B30', '#C2561F']}
          onChange={(v) => setTweak('bankAccent', v)}
        />
        <TweakRadio
          label="Corner radius"
          value={t.cornerRadius}
          options={['sharp', 'soft', 'round']}
          onChange={(v) => setTweak('cornerRadius', v)}
        />
        <TweakSection label="Offer card" />
        <TweakRadio
          label="Layout"
          value={t.cardLayout}
          options={['classic', 'immersive', 'split']}
          onChange={(v) => setTweak('cardLayout', v)}
        />
        <TweakRadio
          label="Activation feedback"
          value={t.activationFeedback}
          options={['instant', 'morph', 'pulse']}
          onChange={(v) => setTweak('activationFeedback', v)}
        />
        <TweakSection label="States" />
        <TweakToggle label="Empty state" value={t.showEmpty} onChange={(v) => setTweak('showEmpty', v)} />
        <TweakButton label="Reset activations" onClick={resetActivations} />
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<PulseApp />);
</script>
